<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Expense Tracker</h1>
      <p class="subtitle">
        Track expenses with user authentication and category totals.
      </p>
    </header>

    <section class="card">
      <div class="section-header">
        <h2>Account</h2>
      </div>

      <div class="auth-grid">
        <form id="register-form" class="expense-form">
          <h3>Create Account</h3>

          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" required />
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" required />
          </div>

          <button type="submit" class="btn">Register</button>
        </form>

        <form id="login-form" class="expense-form">
          <h3>Login</h3>

          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required />
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required />
          </div>

          <button type="submit" class="btn secondary-btn">Login</button>
        </form>
      </div>

      <div class="auth-status-row">
        <p id="auth-status" class="auth-status">Not logged in.</p>
        <button id="logout-btn" class="btn secondary-btn hidden" type="button">
          Logout
        </button>
      </div>

      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2 id="form-heading">Add Expense</h2>
        <button
          id="cancel-edit-btn"
          class="btn secondary-btn hidden"
          type="button"
        >
          Cancel Edit
        </button>
      </div>

      <form id="expense-form" class="expense-form">
        <div class="form-group">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            required
            placeholder="Groceries"
          />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            name="amount"
            step="0.01"
            min="0"
            required
            placeholder="42.50"
          />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input
            type="text"
            id="category"
            name="category"
            required
            placeholder="Food"
          />
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input
            type="date"
            id="date"
            name="date"
            required
          />
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea
            id="notes"
            name="notes"
            rows="3"
            placeholder="Optional notes"
          ></textarea>
        </div>

        <button id="submit-btn" type="submit" class="btn">
          Add Expense
        </button>
      </form>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Expenses</h2>
        <button
          id="load-expenses-btn"
          class="btn secondary-btn"
          type="button"
        >
          Refresh
        </button>
      </div>

      <div class="filter-row">
        <label for="filter-category">Filter by category</label>
        <select id="filter-category" name="filter-category">
          <option value="">All categories</option>
        </select>
      </div>

      <div id="expense-list" class="expense-list">
        <p class="empty-state">Log in to load expenses.</p>
      </div>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Total Spend by Category</h2>
      </div>

      <div id="category-totals-list" class="expense-list">
        <p class="empty-state">Log in to see totals.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
