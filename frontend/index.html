<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Expense Tracker</h1>
      <p class="subtitle">
        A simple app to manage expenses and budget.
      </p>
    </header>

    <section class="card">
      <div class="section-header">
        <h2 id="form-heading">Add Expense</h2>
        <button
          id="cancel-edit-btn"
          class="btn secondary-btn hidden"
          type="button"
        >
          Cancel Edit
        </button>
      </div>

      <form id="expense-form" class="expense-form">
        <div class="form-group">
          <label for="title">Title</label>
          <input
            type="text"
            id="title"
            name="title"
            required
            placeholder="Groceries"
          />
        </div>

        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            name="amount"
            step="0.01"
            min="0"
            required
            placeholder="42.50"
          />
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input
            type="text"
            id="category"
            name="category"
            required
            placeholder="Food"
          />
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input
            type="date"
            id="date"
            name="date"
            required
          />
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea
            id="notes"
            name="notes"
            rows="3"
            placeholder="Optional notes"
          ></textarea>
        </div>

        <button id="submit-btn" type="submit" class="btn">
          Add Expense
        </button>
      </form>

      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <section class="card">
      <div class="section-header">
        <h2>Expenses</h2>
        <button
          id="load-expenses-btn"
          class="btn secondary-btn"
          type="button"
        >
          Refresh
        </button>
      </div>

      <div id="expense-list" class="expense-list">
        <p class="empty-state">No expenses loaded yet.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
